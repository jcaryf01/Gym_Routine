<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Your Gym Routine</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #d0d5e0;
    --accent: #d4870a;
    --accent2: #0a9e9e;
    --text: #1a1f2e;
    --muted: #5a6380;
    --push: #c94020;
    --pull: #1a7acc;
    --legs: #2e8c2e;
    --cardio: #0a9e9e;
    --circuit: #9040c0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 25px;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .header {
    background: linear-gradient(135deg, #ffffff 0%, #e8ecf4 100%);
    border-bottom: 2px solid var(--accent);
    padding: 18px 16px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); }
  .header p { font-size: 21px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; }
  .today-badge { background: var(--accent); color: #000; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 21px; padding: 4px 10px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase; }

  .day-tabs { display: flex; gap: 6px; padding: 14px 16px 14px; overflow-x: auto; scrollbar-width: none; background: var(--bg); position: sticky; top: 72px; z-index: 99; border-bottom: 1px solid var(--border); }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab { flex-shrink: 0; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 14px; cursor: pointer; transition: all 0.2s; text-align: center; min-width: 58px; }
  .day-tab .abbr { font-family: 'Barlow Condensed', sans-serif; font-size: 23px; font-weight: 700; letter-spacing: 1px; display: block; }
  .day-tab .label { font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-top: 1px; }
  .day-tab.active { border-color: currentColor; background: var(--card); }
  .day-tab.push { color: var(--push); } .day-tab.pull { color: var(--pull); } .day-tab.legs { color: var(--legs); } .day-tab.cardio { color: var(--cardio); } .day-tab.circuit { color: var(--circuit); }

  .content { padding: 16px; }
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .day-hero { border-radius: 14px; padding: 16px 18px; margin-bottom: 16px; position: relative; overflow: hidden; }
  .day-hero::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; opacity: 0.1; background: currentColor; }
  .day-hero.push { background: linear-gradient(135deg, #fde8e2, #f0f2f5); color: var(--push); border: 1px solid #f0c0b0; }
  .day-hero.pull { background: linear-gradient(135deg, #e2eefa, #f0f2f5); color: var(--pull); border: 1px solid #b0ccee; }
  .day-hero.legs { background: linear-gradient(135deg, #e2f0e2, #f0f2f5); color: var(--legs); border: 1px solid #b0d8b0; }
  .day-hero.cardio { background: linear-gradient(135deg, #e0f4f4, #f0f2f5); color: var(--cardio); border: 1px solid #a0d8d8; }
  .day-hero.circuit { background: linear-gradient(135deg, #f0e4fa, #f0f2f5); color: var(--circuit); border: 1px solid #d0a8ee; }
  .day-hero .day-name { font-family: 'Barlow Condensed', sans-serif; font-size: 40px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: currentColor; }
  .day-hero .day-focus { font-size: 23px; color: var(--text); margin-top: 2px; font-weight: 500; }
  .day-hero .day-meta { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .meta-pill { background: rgba(0,0,0,0.06); border-radius: 20px; padding: 3px 10px; font-size: 17px; color: var(--muted); }

  .section { margin-bottom: 16px; }
  .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 23px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; padding-left: 2px; }

  .exercise-list { display: flex; flex-direction: column; gap: 8px; }
  .ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
  .ex-card.done { opacity: 0.45; background: var(--surface); }
  .ex-card.done .ex-name { text-decoration: line-through; }
  .ex-num { font-family: 'Barlow Condensed', sans-serif; font-size: 25px; font-weight: 700; color: var(--muted); min-width: 22px; text-align: center; }
  .ex-info { flex: 1; }
  .ex-name { font-weight: 600; font-size: 24px; color: var(--text); line-height: 1.2; }
  .ex-note { font-size: 23px; color: var(--muted); margin-top: 2px; }
  .ex-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; text-align: center; flex-shrink: 0; }
  .ex-badge .sets { font-family: 'Barlow Condensed', sans-serif; font-size: 25px; font-weight: 700; line-height: 1; color: var(--accent); }
  .ex-badge .reps { font-size: 16px; color: var(--muted); }
  .check-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 21px; display: none; }
  .ex-card.done .check-icon { display: block; }
  .ex-card.done .ex-badge { display: none; }

  .stretch-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: opacity 0.2s; }
  .stretch-card.done { opacity: 0.4; }
  .stretch-card.done .stretch-name { text-decoration: line-through; }
  .stretch-icon { font-size: 24px; min-width: 28px; text-align: center; }
  .stretch-info { flex: 1; }
  .stretch-name { font-size: 23px; font-weight: 500; }
  .stretch-detail { font-size: 23px; color: var(--muted); margin-top: 1px; }
  .stretch-check { font-size: 23px; margin-left: auto; display: none; }
  .stretch-card.done .stretch-check { display: block; }

  .circuit-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .circuit-card.done { opacity: 0.4; }
  .circuit-card.done .ex-name { text-decoration: line-through; }
  .circuit-step { width: 36px; height: 36px; border-radius: 50%; background: var(--circuit); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 21px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  .warmup-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; display: flex; align-items: center; gap: 12px; }
  .warmup-icon { font-size: 26px; }
  .warmup-text { font-size: 25px; }
  .warmup-text strong { display: block; font-weight: 600; }
  .warmup-text span { color: var(--muted); font-size: 23px; }

  .progress-wrap { background: var(--surface); border-radius: 14px; padding: 12px 14px; margin-bottom: 16px; border: 1px solid var(--border); }
  .progress-top { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 21px; color: var(--muted); }
  .progress-bar-bg { background: var(--border); border-radius: 10px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }

  .reset-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 20px; font-family: 'Barlow', sans-serif; font-size: 21px; cursor: pointer; display: block; margin: 0 auto 20px; letter-spacing: 0.5px; }
  .reset-btn:active { background: var(--card); }

  .tip-box { background: var(--card); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 12px 14px; font-size: 19px; color: var(--muted); line-height: 1.5; margin-top: 8px; }
  .tip-box strong { color: var(--accent); display: block; margin-bottom: 3px; font-size: 17px; letter-spacing: 1px; text-transform: uppercase; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .timer-overlay { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .timer-overlay.visible { transform: translateY(0); }
  .timer-sheet { background: #ffffff; border-top: 2px solid var(--accent); border-radius: 22px 22px 0 0; padding: 20px 24px 36px; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); }
  .timer-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
